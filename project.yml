name: QuickMemo
options:
  bundleIdPrefix: com.iwakisyogo
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5"
    DEVELOPMENT_TEAM: 9SVPJ6X69X
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 12
    MARKETING_VERSION: 1.0.0
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"
targets:
  QuickMemo:
    type: application
    platform: iOS
    sources:
      - QuickMemo
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        PRODUCT_BUNDLE_IDENTIFIER: com.iwakisyogo.QuickMemo
        INFOPLIST_KEY_CFBundleDisplayName: Issuepad
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: QuickMemo/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        GADApplicationIdentifier: ca-app-pub-1265529246324725~4657732860
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - quickmemo
    dependencies:
      - target: QuickMemoWidget
      - package: GoogleMobileAds

  QuickMemoWidget:
    type: app-extension
    platform: iOS
    sources:
      - QuickMemoWidget
    info:
      path: QuickMemoWidget/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iwakisyogo.QuickMemo.Widget
        INFOPLIST_KEY_CFBundleDisplayName: Issuepad Widget
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CURRENT_PROJECT_VERSION: 12
        MARKETING_VERSION: 1.0.0
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
    entitlements:
      path: QuickMemoWidget/QuickMemoWidget.entitlements
